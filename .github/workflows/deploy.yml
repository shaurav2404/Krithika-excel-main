name: Deploy to ECS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build image
      run: docker build -t app .

    - name: Tag image
      run: |
        docker tag app:latest ${{ steps.login-ecr.outputs.registry }}/krithika-excel-service:latest

    - name: Push image
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/krithika-excel-service:latest

    - name: Deploy ECS
      run: |
        aws ecs update-service \
          --cluster excel-cluster \
          --service excel-task-service \
          --force-new-deployment
